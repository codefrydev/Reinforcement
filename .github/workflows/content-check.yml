# Lint markdown and check links (content verification)
name: Content check

on:
  push:
    paths:
      - "content/**"
      - "layouts/**"
      - ".markdownlint.yaml"
    branches:
      - master
  pull_request:
    paths:
      - "content/**"
      - "layouts/**"
      - ".markdownlint.yaml"
    branches:
      - master

jobs:
  markdownlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Run markdownlint
        run: npx markdownlint-cli2 "content/**/*.md" "*.md" --config .markdownlint.yaml

  linkcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Hugo
        run: |
          wget -q -O /tmp/hugo.deb https://github.com/gohugoio/hugo/releases/download/v0.140.0/hugo_extended_0.140.0_linux-amd64.deb
          sudo dpkg -i /tmp/hugo.deb
      - name: Build site
        run: hugo --gc --baseURL "https://codefrydev.in/Reinforcement/"
      - name: Lychee link check (built site)
        uses: lycheeverse/lychee-action@v2
        with:
          args: --base "https://codefrydev.in/Reinforcement/" --no-progress ./
          workingDirectory: public
          fail: false
