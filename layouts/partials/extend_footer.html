<script>
document.addEventListener('click', function (e) {
  var btn = e.target.closest('.pyrepl-load-btn');
  if (!btn) return;
  var wrap = btn.closest('.pyrepl-frame-wrap');
  if (!wrap) return;
  var iframe = wrap.querySelector('iframe.pyrepl-frame');
  if (!iframe || !iframe.dataset.src) return;
  iframe.src = iframe.dataset.src;
  var overlay = wrap.querySelector('.pyrepl-overlay');
  if (overlay) overlay.style.display = 'none';
});
</script>
<script>
document.addEventListener('click', function (e) {
  var btn = e.target.closest('.module-code-copy');
  if (!btn) return;
  var wrap = btn.closest('.module-code-wrap');
  var pre = wrap && wrap.querySelector('pre');
  if (!pre) return;
  var text = pre.textContent || '';
  if (!navigator.clipboard || !navigator.clipboard.writeText) return;
  navigator.clipboard.writeText(text).then(function () {
    var lab = btn.querySelector('.module-code-copy-label');
    if (!lab) return;
    var prev = lab.textContent;
    lab.textContent = 'Copied';
    window.setTimeout(function () { lab.textContent = prev; }, 1500);
  });
});
</script>
