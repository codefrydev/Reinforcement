{{- $path := .Get "path" | default "" -}}
{{- $title := .Get "title" | default "Open exercise notebook" -}}
{{- $baseURL := "https://codefrydev.in/Reinforcement/lab/notebooks/index.html" -}}
{{- $href := printf "%s?path=%s" $baseURL $path -}}
<a href="{{ $href }}" class="notebook-link" target="_blank" rel="noopener">
  <svg class="notebook-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" width="16" height="16"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect><line x1="8" y1="21" x2="16" y2="21"></line><line x1="12" y1="17" x2="12" y2="21"></line></svg>
  {{ $title }}
</a>
