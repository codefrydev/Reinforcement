baseURL: https://codefrydev.in/Reinforcement/
languageCode: en-us
title: Reinforcement Learning Curriculum
theme: PaperMod

enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

googleAnalytics: G-VM01Q3R43D

minify:
  disableXML: true
  minifyOutput: true

# llms.txt — PaperMod ships layouts/_default/llms.txt; this wires the home output.
mediaTypes:
  text/llms:
    suffixes:
      - txt

outputFormats:
  LLMS:
    mediaType: text/llms
    basename: llms
    isPlainText: true

# Generate index.json for search (PaperMod Fuse.js search) + llms.txt for LLM discovery
outputs:
  home: ["HTML", "RSS", "JSON", "LLMS"]

params:
  math: true
  env: production # to enable google analytics, opengraph, twitter-cards and schema.
  title: Reinforcement Learning Curriculum
  description: "Reinforcement learning curriculum by codefrydev — 100 chapters, prerequisites, and readiness assessments. Hosted at codefrydev.in."
  keywords: [Reinforcement Learning, RL, curriculum, codefrydev, machine learning]
  author: codefrydev
  images:
    - og-default.png
  DateFormat: "January 2, 2006"
  defaultTheme: auto # dark, light
  disableThemeToggle: false

  ShowReadingTime: true
  ShowShareButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowWordCount: true
  ShowRssButtonInSectionTermList: true
  ShowAllPagesInArchive: true  # list all sections (learning-path, math-for-rl, prerequisites, curriculum, etc.), not only mainSections
  UseHugoToc: true
  disableSpecial1stPost: false
  disableScrollToTop: false
  comments: true
  disqusShortname: codefrydev
  hidemeta: false
  hideSummary: false
  showtoc: false
  tocopen: false

  assets:
    disableHLJS: true  # use Hugo Chroma instead of highlight.js (PaperMod FAQ)
    # disableFingerprinting: true

  label:
    text: "Home"
    icon: apple-touch-icon.png
    iconHeight: 35

  # profile-mode
  profileMode:
    enabled: false # needs to be explicitly set
    title: codefrydev
    subtitle: "Reinforcement Learning Curriculum"
    imageUrl: "<img location>"
    imageWidth: 120
    imageHeight: 120
    imageTitle: my image
    buttons:
      - name: Posts
        url: posts
      - name: Tags
        url: tags


  socialIcons:
    - name: email
      url: "mailto:codefrydev@gmail.com"
    - name: linkedin
      url: "https://www.linkedin.com/in/codefrydev"
    - name: github
      url: "https://github.com/codefrydev"
    - name: youtube
      url: "https://www.youtube.com/c/codefrydev"

  cover:
    hidden: true # hide everywhere but not in structured data
    hiddenInList: false # show on list pages and home
    hiddenInSingle: false # show on single page

  editPost:
    URL: "https://github.com/codefrydev/Reinforcement/blob/main/content"
    Text: "Suggest Changes"
    appendFilePath: true

  # for search
  # https://fusejs.io/api/options.html
  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    limit: 10 # refer: https://www.fusejs.io/api/methods.html#search
    keys: ["title", "permalink", "summary", "content"]
menu:
  main:
    # Nested "Learn" dropdown
    - identifier: learn
      name: Learn
      url: /learning-path/
      weight: 4
    - identifier: course-outline
      name: Course outline
      url: /course-outline/
      parent: learn
      weight: 0
    - identifier: learning-path
      name: Learning path
      url: /learning-path/
      parent: learn
      weight: 1
    - identifier: math-for-rl
      name: Math for RL
      url: /math-for-rl/
      parent: learn
      weight: 2
    - identifier: preliminary
      name: Preliminary
      url: /preliminary/
      parent: learn
      weight: 3
    - identifier: prerequisites
      name: Prerequisites
      url: /prerequisites/
      parent: learn
      weight: 4
    - identifier: curriculum
      name: Curriculum
      url: /curriculum/
      parent: learn
      weight: 5
    # Top-level links
    - identifier: Search
      name: search
      url: /search/
      weight: 10
    - identifier: tags
      name: tags
      url: /tags/
      weight: 20
    - identifier: archives
      name: Archives
      url: /archives/
      weight: 25
    # New pages
    - identifier: glossary
      name: Glossary
      url: /glossary/
      parent: learn
      weight: 6
    - identifier: assessments
      name: Assessments
      url: /assessment/
      parent: learn
      weight: 7
    - identifier: lab
      name: "🧪 Lab (Python)"
      url: "https://codefrydev.in/Reinforcement/lab/"
      weight: 5
    - identifier: appendix
      name: Appendix
      url: /appendix/
      parent: learn
      weight: 8

pygmentsUseClasses: true
markup:
  highlight:
    codeFences: true
    guessSyntax: true
    lineNos: true
    noClasses: false
    style: monokai
  mermaid:
    enable: true
